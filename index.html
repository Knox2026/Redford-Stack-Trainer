<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Trainer Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="rsl.png">
    <meta name="theme-color" content="#a98467">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <style>
        :root {
            --bg-color: #3e362e;
            --container-bg: #ede0d4;
            --text-color: #432818;
            --correct-color: #6a994e;
            --wrong-color: #bc4749;
            --ai-color: #457b9d;
            --btn-color: #a98467;
            --btn-hover: #8d6b51;
            --btn-text: #ffffff;
            --card-bg: white;
            --tray-bg: rgba(0,0,0,0.05);
            --heat-base: #e3d5ca;
            --heat-btn-bg: #432818;
            --heat-btn-text: #ffffff;
            --border-color: rgba(0,0,0,0.1);
            --toggle-active-bg: #ffffff;
            --toggle-active-text: #432818;
            --num-bg: #d5bdaf;
            --neon-mic: #39ff14;
        }

        body.dark-theme {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --btn-color: #3d3d3d;
            --btn-hover: #505050;
            --btn-text: #ffffff;
            --card-bg: #2d2d2d;
            --tray-bg: rgba(255,255,255,0.05);
            --heat-base: #333333;
            --heat-btn-bg: #e0e0e0;
            --heat-btn-text: #121212;
            --border-color: rgba(255,255,255,0.1);
            --toggle-active-bg: #f5ebe0;
            --toggle-active-text: #121212;
            --num-bg: #404040;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 10px; margin: 0; box-sizing: border-box;
            transition: background-color 0.3s ease;
        }

        .container {
            background-color: var(--container-bg);
            max-width: 650px; width: 100%; padding: 20px; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); text-align: center;
            display: flex; flex-direction: column; max-height: 98vh; overflow-y: auto;
            scrollbar-width: none;
        }
        .container::-webkit-scrollbar { display: none; }

        .menu-header { display: flex; align-items: center; margin-bottom: 15px; width: 100%; gap: 8px; }
        .header-right-group { display: flex; gap: 8px; flex: 1; justify-content: flex-end; }

        button { cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: none; outline: none; display: flex; align-items: center; justify-content: center; }
        button:active { transform: scale(0.95); }

        .theme-toggle-btn, .stack-view-btn, .heat-view-btn, .voice-status-btn { background: var(--btn-color); color: var(--btn-text); width: 42px; height: 38px; border-radius: 8px; font-size: 1.1em; }
        .settings-toggle-btn, .history-toggle-btn { background: var(--btn-color); color: var(--btn-text); padding: 8px 15px; border-radius: 8px; font-size: 0.85em; font-weight: bold; }
        
        #settingsTray, #historyTray, #stackTray, #modeTray { background: var(--tray-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); }

        .stack-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 4px; padding: 5px; font-size: 0.75em; }
        .stack-item { background: var(--card-bg); border-radius: 6px; border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; cursor: pointer; }
        .stack-num { font-weight: 800; font-size: 0.8em; color: var(--text-color); background: var(--num-bg); padding: 2px 0; width: 100%; }
        .stack-val-label { padding: 4px 0; font-weight: bold; font-size: 1.1em; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--container-bg); padding: 25px; border-radius: 15px; max-width: 300px; width: 90%; box-shadow: 0 5px 30px rgba(0,0,0,0.5); border: 2px solid var(--btn-color); position: relative; }
        .modal-close { position: absolute; top: 10px; right: 10px; font-size: 1.5rem; cursor: pointer; opacity: 0.5; }
        .stat-row { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; font-weight: 500; }

        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); background: rgba(0,0,0,0.1); padding: 8px 12px; border-radius: 12px; margin-bottom: 15px; font-weight: bold; font-size: 1.1em; }
        .stat-val { margin-left: 4px; }
        .green { color: var(--correct-color); }
        .red { color: var(--wrong-color); }

        .card-display { height: 280px; display: flex; align-items: center; justify-content: center; margin: 10px 0; border-radius: 12px; }
        .number-card {
            height: 200px; aspect-ratio: 2.5 / 3.5; background: white; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 100px; color: #1a1a1a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid #ccc; font-weight: 700;
        }
        .card-img { height: 200px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); object-fit: contain; }

        .input-area { min-height: 90px; margin: 10px 0; }
        #feedback { margin-top: 10px; font-weight: bold; height: 20px; }

        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        button.action-btn { padding: 12px; border-radius: 8px; background-color: var(--btn-color); color: white; font-weight: bold; font-size: 0.85em; }
        button.start { background-color: var(--correct-color); grid-column: span 2; font-size: 1.1em; padding: 15px; margin-bottom: 5px; }

        .debug-console { font-size: 0.65em; background: rgba(0,0,0,0.1); color: var(--text-color); padding: 5px; border-radius: 5px; height: 1.2em; overflow: hidden; font-family: monospace; opacity: 0.6; margin-top: 10px; }
        .hidden { display: none; }
        .listening .mic-icon { fill: var(--neon-mic); animation: pulse-mic 1.5s infinite; }
        @keyframes pulse-mic { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="cardModal" class="modal-overlay hidden">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">×</span>
        <div id="modalCardTitle" style="font-size: 2rem; margin-bottom: 15px; font-weight: bold;"></div>
        <div class="stat-row"><span>Stats (✔/✖/Total):</span> <span id="modalStats">0/0/0</span></div>
        <div class="stat-row"><span>Accuracy:</span> <span id="modalAcc">0%</span></div>
        <div class="stat-row"><span>Avg Speed:</span> <span id="modalSpeed">0s</span></div>
    </div>
</div>

<div class="container">
    <div class="menu-header">
        <button id="themeBtn" class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
        <button class="stack-view-btn" onclick="toggleStackView()">📋</button>
        <button class="heat-view-btn" onclick="toggleHeatMap()">🔥</button>
        <div id="micStatus" class="voice-status-btn">
            <svg class="mic-icon" width="22" height="22" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </div>
        <div class="header-right-group">
            <button class="settings-toggle-btn" onclick="toggleSettings()">⚙ Settings</button>
            <button class="history-toggle-btn" onclick="toggleHistory()">🏆 Stats</button>
        </div>
    </div>

    <div id="stackTray" class="hidden">
        <div id="stackList" class="stack-grid"></div>
    </div>
    <div id="heatMap" class="heat-map hidden"></div>
    <div id="settingsTray" class="hidden">
        <div class="toggle-group">
            <button id="aiBtn" class="separate-btn" onclick="toggleAI()">AI: OFF</button>
            <button id="voiceBtn" class="separate-btn" onclick="toggleVoice()">Voice: OFF</button>
        </div>
        <input type="number" id="minRange" value="1" min="1" max="52"> to <input type="number" id="maxRange" value="52" min="1" max="52">
        <button onclick="clearHistory()">Wipe Data</button>
    </div>

    <div id="historyTray" class="hidden">
        <table class="history-table"><tbody id="historyBody"></tbody></table>
    </div>

    <div class="scoreboard">
        <div>✔<span id="score-correct" class="stat-val green">0</span></div>
        <div>✖<span id="score-wrong" class="stat-val red">0</span></div>
        <div>Total<span id="score-total" class="stat-val">0</span></div>
    </div>

    <div id="display" class="card-display">Ready?</div>
    <div class="input-area"><div id="feedback"></div></div>

    <div class="btn-group">
        <button id="startBtn" class="action-btn start" onclick="archiveAndRestart()">New Session</button>
    </div>
    
    <div id="voiceDebug" class="debug-console">Mic status: standby</div>
</div>

<script>
    const stack = [null, "QH", "2S", "5D", "8C", "JH", "KS", "10H", "7C", "4D", "AS", "8H", "5C", "2D", "QS", "9H", "6C", "3D", "10S", "7H", "4C", "AD", "JS", "9S", "6H", "3C", "KD", "QD", "10D", "7S", "4H", "AC", "JD", "8S", "5H", "2C", "2H", "QC", "9D", "6S", "3H", "KC", "4S", "AH", "JC", "8D", "5S", "3S", "KH", "10C", "7D", "6D", "9C"];
    const suitSymbols = { "H": "♥", "D": "♦", "C": "♣", "S": "♠" };
    
    let inputMethod = 'choice', aiMode = false, voiceMode = false, currentMode = 'C2N_RAND', currentTarget = null, isDarkMode = false;
    let stats = { correct: 0, wrong: 0, total: 0 };
    let heatData = Array(53).fill(0);
    let sessionHistory = [], cardStats = {}, totalActiveTime = 0, wakeLock = null;

    /* -------------------------------------------------------------------
       HD VOICE ENGINE (Bluetooth Optimized)
    ------------------------------------------------------------------- */
    const voiceNames = {"H":"Hearts","D":"Diamonds","C":"Clubs","S":"Spades","J":"Jack","Q":"Queen","K":"King","A":"Ace"};
    let isSpeaking = false, audioContext, preferredVoice = null;

    function loadVoices() {
        let voices = window.speechSynthesis.getVoices();
        preferredVoice = voices.find(v => v.name.includes('Google') && v.lang.includes('en-US')) ||
                         voices.find(v => v.name.includes('Premium')) ||
                         voices.find(v => v.lang.includes('en-US')) || voices[0];
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function resumeAudio() {
        try {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') audioContext.resume();
        } catch (e) {}
    }

    function speak(text) {
        if(!voiceMode) return;
        window.speechSynthesis.cancel();
        resumeAudio();
        setTimeout(() => {
            let msg = new SpeechSynthesisUtterance(text);
            if (preferredVoice) msg.voice = preferredVoice;
            msg.rate = 1.05; msg.pitch = 1.0;
            msg.onstart = () => { isSpeaking = true; updateMicIcon(false); };
            msg.onend = () => { isSpeaking = false; updateMicIcon(true); };
            window.speechSynthesis.speak(msg);
        }, 150);
    }

    let recognition;
    function initVoiceRecognition() {
        const SpeechComp = window.webkitSpeechRecognition || window.SpeechRecognition;
        if(!SpeechComp) return;

        // BLUETOOTH FIX: Request specific audio constraints to avoid "Telephone Mode"
        const constraints = { 
            audio: { 
                echoCancellation: true, 
                noiseSuppression: true, 
                autoGainControl: true 
            } 
        };

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    document.getElementById('voiceDebug').innerText = "Mic: High-Fidelity Active";
                    startRecognitionEngine(SpeechComp);
                })
                .catch(function(err) {
                    document.getElementById('voiceDebug').innerText = "Mic Error: " + err.name;
                    startRecognitionEngine(SpeechComp);
                });
        } else {
            startRecognitionEngine(SpeechComp);
        }
    }

    function startRecognitionEngine(SpeechComp) {
        if(recognition) { recognition.onend = null; recognition.stop(); }
        recognition = new SpeechComp();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            if (isSpeaking) return; 
            let transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
            document.getElementById('voiceDebug').innerText = "Heard: " + transcript;
            processVoiceInput(transcript);
        };
        recognition.onend = () => { if(voiceMode) setTimeout(() => { try { recognition.start(); } catch(e){} }, 100); };
        try { recognition.start(); updateMicIcon(true); } catch(e){}
    }

    function processVoiceInput(text) {
        let input = text.toLowerCase().trim();
        const phoneticMap = {
            "to": "2", "too": "2", "two": "2", "three": "3", "for": "4", "four": "4", 
            "five": "5", "fine": "5", "fire": "5", "six": "6", "seven": "7", "heaven": "7", 
            "ate": "8", "eight": "8", "nine": "9", "ten": "10", "one": "1"
        };
        for (let word in phoneticMap) {
            let reg = new RegExp("\\b" + word + "\\b", "g");
            input = input.replace(reg, phoneticMap[word]);
        }
        const suits = { "hearts": "H", "heart": "H", "diamonds": "D", "diamond": "D", "clubs": "C", "club": "C", "spades": "S", "spade": "S" };
        const faces = { "ace": "A", "king": "K", "queen": "Q", "jack": "J", "ten": "10" };
        let foundSuit = null, foundVal = null;
        for (let s in suits) { if (input.includes(s)) { foundSuit = suits[s]; break; } }
        for (let f in faces) { if (input.includes(f)) { foundVal = faces[f]; break; } }
        if (!foundVal) {
            let numMatch = input.match(/(10|[1-9])/); 
            if (numMatch) foundVal = numMatch[0];
        }
        if (foundSuit && foundVal) { validate(foundVal + foundSuit); }
        else {
            let digits = input.match(/\d+/);
            if (digits) validate(digits[0]);
        }
    }

    /* Standard App Logic (Unchanged) */
    function generateQuestion() {
        const pos = Math.floor(Math.random() * 52) + 1;
        document.getElementById('display').innerHTML = `<div class="number-card">${pos}</div>`;
        currentTarget = { ans: stack[pos], pos: pos };
        speak(pos.toString());
    }

    function validate(userAns) {
        if (!currentTarget) return;
        const correct = currentTarget.ans.toUpperCase(), input = userAns.toUpperCase().trim();
        if (input === correct) {
            stats.correct++; document.getElementById('feedback').innerText = "✔";
            speak("Correct"); setTimeout(generateQuestion, 1200);
        } else {
            stats.wrong++; document.getElementById('feedback').innerText = "✖ " + correct;
            speak("Wrong, it was " + correct); setTimeout(generateQuestion, 3000);
        }
        updateScore();
    }

    function updateScore() {
        document.getElementById('score-correct').innerText = stats.correct;
        document.getElementById('score-wrong').innerText = stats.wrong;
        document.getElementById('score-total').innerText = stats.correct + stats.wrong;
    }

    function toggleVoice() {
        voiceMode = !voiceMode;
        document.getElementById('voiceBtn').innerText = voiceMode ? "Voice: ON" : "Voice: OFF";
        if(voiceMode) initVoiceRecognition();
        else if(recognition) recognition.stop();
    }

    function archiveAndRestart() { stats = { correct: 0, wrong: 0 }; updateScore(); generateQuestion(); }
    function updateMicIcon(isListening) { document.getElementById('micStatus').classList.toggle('listening', isListening && voiceMode); }
    function toggleTheme() { isDarkMode = !isDarkMode; document.body.classList.toggle('dark-theme', isDarkMode); }
    function toggleSettings() { document.getElementById('settingsTray').classList.toggle('hidden'); }
    function toggleStackView() { document.getElementById('stackTray').classList.toggle('hidden'); }
    function toggleHeatMap() { document.getElementById('heatMap').classList.toggle('hidden'); }

    window.onload = () => { if(voiceMode) initVoiceRecognition(); };
</script>
</body>
</html>
